<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mscc</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f4c430;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      position: fixed;
      inset: 0;
      background: #ffffff;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #curtain {
      position: fixed;
      inset: 0;
      background: #f4c430;
      z-index: 100;
      transform: translateY(0%);
      transition: transform 1.1s cubic-bezier(0.77, 0, 0.18, 1);
    }
    #curtain.open { transform: translateY(-100%); }

    #stage {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0.06em;
    }

    .letter {
      font-family: 'DM Sans', 'GT Walsheim', sans-serif;
      font-weight: 900;
      font-size: clamp(8rem, 20vw, 16rem);
      line-height: 1;
      display: inline-block;
      opacity: 0;
      will-change: transform;
      user-select: none;
      transform-origin: center center;
      cursor: grab;
    }
    .letter:active { cursor: grabbing; }

    .letter-m  { color: #f4622a; }
    .letter-s  { color: #e6303d; }
    .letter-c1 { color: #f4c430; }
    .letter-c2 { color: #f4c430; }

    #fade {
      position: fixed;
      inset: 0;
      background: #f4c430;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
    }
    #fade.active { opacity: 1; pointer-events: none; }
  </style>
</head>
<body>

  <div id="curtain"></div>

  <div id="canvas">
    <div id="stage">
      <span class="letter letter-m"  >m</span>
      <span class="letter letter-s"  >s</span>
      <span class="letter letter-c1" >c</span>
      <span class="letter letter-c2" >c</span>
    </div>
  </div>

  <div id="fade"></div>

  <script>
    const letters  = Array.from(document.querySelectorAll('.letter'));
    const curtain  = document.getElementById('curtain');
    const fadeEl   = document.getElementById('fade');

    const GRAVITY     = 4900;
    const RESTITUTION = 0.15;
    const STOP_VEL    = 60;

    const START_Y = -(window.innerHeight * 1.15);

    // World space: origin = viewport center.
    // s.x / s.y are offsets from that origin.
    const state = letters.map(() => ({
      x: 0, y: START_Y,
      vx: 0, vy: 0,
      rot: 0, vrot: 0,
      active: false,
      settled: false,
      grabOffsetX: 0,  // world-space delta: letter pos minus cursor pos at grab time
      grabOffsetY: 0,
    }));

    let allSettled = false;
    let rafId      = null;
    let lastTime   = null;
    let dragging   = null;

    // Track cursor in screen space
    let cursorX = window.innerWidth  / 2;
    let cursorY = window.innerHeight / 2;

    // Open curtain
    setTimeout(() => curtain.classList.add('open'), 200);

    // Drop letters with stagger
    letters.forEach((el, i) => {
      setTimeout(() => {
        state[i].active = true;
        el.style.opacity = '1';
        if (!rafId) { lastTime = null; rafId = requestAnimationFrame(tick); }
      }, 900 + i * 200);
    });

    function tick(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min((ts - lastTime) / 1000, 0.05);
      lastTime = ts;
      let anyMoving = false;

      letters.forEach((el, i) => {
        const s = state[i];
        if (!s.active) return;

        if (dragging === i) {
          // ── DIRECT DRAG ──
          // Convert cursor screen pos → world pos (origin = viewport center).
          // targetX/Y = cursorWorld + grabOffset.
          // Since grabOffset = letterWorld - cursorWorld at mousedown,
          // this means the grabbed point on the letter stays exactly under the cursor.
          const cx = cursorX - window.innerWidth  / 2;
          const cy = cursorY - window.innerHeight / 2;
          const prevX = s.x;
          const prevY = s.y;
          s.x = cx + s.grabOffsetX;
          s.y = cy + s.grabOffsetY;

          // Smooth velocity for release - lerp toward instantaneous value to avoid spikes
          const rawVx = (s.x - prevX) / dt;
          const rawVy = (s.y - prevY) / dt;
          s.vx += (rawVx - s.vx) * 0.4;
          s.vy += (rawVy - s.vy) * 0.4;

          // Slight tilt based on horizontal speed
          const tiltTarget = (s.x - prevX) / dt * 0.003;
          s.rot += (tiltTarget - s.rot) * Math.min(dt * 12, 1);

          anyMoving = true;

        } else if (!s.settled) {
          // ── FREE FALL ──
          s.vy += GRAVITY * dt;
          s.y  += s.vy * dt;

          s.vx *= (1 - 4 * dt);
          s.x  += s.vx * dt;

          // Spring rotation back to upright
          s.vrot += (-s.rot * 14 - s.vrot * 7) * dt;
          s.rot  += s.vrot * dt;

          // Floor bounce
          if (s.y >= 0) {
            s.y = 0;
            const bounced = -s.vy * RESTITUTION;
            if (Math.abs(bounced) < STOP_VEL) {
              s.vy = 0; s.vx = 0;
              s.settled = true;
            } else {
              s.vy = bounced;
            }
          }

          // Walls
          const halfW = window.innerWidth  / 2 - 40;
          const halfH = window.innerHeight / 2 - 40;
          if (s.x >  halfW) { s.x =  halfW; s.vx *= -0.3; }
          if (s.x < -halfW) { s.x = -halfW; s.vx *= -0.3; }
          if (s.y < -halfH) { s.y = -halfH; s.vy *= -0.3; }

          anyMoving = true;
        }

        el.style.transform = `translate(${s.x}px, ${s.y}px) rotate(${s.rot}deg)`;
      });

      if (!allSettled && state.every(s => !s.active || s.settled)) allSettled = true;
      rafId = anyMoving ? requestAnimationFrame(tick) : null;
    }

    window.addEventListener('mousedown', e => {

      letters.forEach((el, i) => {
        const s = state[i];
        if (!s.active) return; // not yet dropped
        const rect = el.getBoundingClientRect();
        if (
          e.clientX >= rect.left && e.clientX <= rect.right &&
          e.clientY >= rect.top  && e.clientY <= rect.bottom
        ) {
          dragging = i;
          s.settled = false;

          // Cursor in world space at the moment of grab
          const cursorWorldX = e.clientX - window.innerWidth  / 2;
          const cursorWorldY = e.clientY - window.innerHeight / 2;

          // Grab offset = letter world pos minus cursor world pos.
          // Adding this back to cursorWorld during drag keeps the
          // exact grab point pinned under the cursor.
          s.grabOffsetX = s.x - cursorWorldX;
          s.grabOffsetY = s.y - cursorWorldY;

          s.vx = 0;
          s.vy = 0;

          e.preventDefault();
          if (!rafId) { lastTime = null; rafId = requestAnimationFrame(tick); }
        }
      });
    });

    window.addEventListener('mousemove', e => {
      cursorX = e.clientX;
      cursorY = e.clientY;
    });

    window.addEventListener('mouseup', () => {
      if (dragging !== null) {
        const s = state[dragging];
        // Carry drag velocity into free fall; cap it to avoid rocket launches
        const cap = 2000;
        s.vx = Math.max(-cap, Math.min(cap, s.vx));
        s.vy = Math.max(-cap, Math.min(cap, s.vy));
        s.vrot = s.vx * 0.05;
        dragging = null;
        if (!rafId) { lastTime = null; rafId = requestAnimationFrame(tick); }
      }
    });

    // location.replace so index.html is NOT in browser history.
    // Pressing Back from home.html skips index.html correctly.
    setTimeout(() => {
      fadeEl.classList.add('active');
      setTimeout(() => { window.location.replace('home.html'); }, 950);
    }, 4400);
  </script>
</body>
</html>
