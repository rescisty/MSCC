<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mscc</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Body is yellow — no flash ever */
    body {
      background: #f4c430;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* White canvas — sits between body and curtain. 
       This is where the letters live. */
    #canvas {
      position: fixed;
      inset: 0;
      background: #ffffff;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #curtain {
      position: fixed;
      inset: 0;
      background: #f4c430;
      z-index: 100;
      transform: translateY(0%);
      transition: transform 1.1s cubic-bezier(0.77, 0, 0.18, 1);
    }
    #curtain.open { transform: translateY(-100%); }

    #stage {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0.06em;
    }

    .letter {
      font-family: 'DM Sans', 'GT Walsheim', sans-serif;
      font-weight: 900;
      font-size: clamp(8rem, 20vw, 16rem);
      line-height: 1;
      display: inline-block;
      opacity: 0;
      will-change: transform;
      user-select: none;
      transform-origin: center center;
      cursor: grab;
    }
    .letter:active { cursor: grabbing; }

    .letter-m  { color: #f4622a; }
    .letter-s  { color: #e6303d; }
    .letter-c1 { color: #f4c430; }
    .letter-c2 { color: #f4c430; }

    #fade {
      position: fixed;
      inset: 0;
      background: #f4c430;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
    }
    #fade.active { opacity: 1; }
  </style>
</head>
<body>

  <div id="curtain"></div>

  <div id="canvas">
    <div id="stage">
      <span class="letter letter-m"  >m</span>
      <span class="letter letter-s"  >s</span>
      <span class="letter letter-c1" >c</span>
      <span class="letter letter-c2" >c</span>
    </div>
  </div>

  <div id="fade"></div>

  <script>
    const letters  = Array.from(document.querySelectorAll('.letter'));
    const curtain  = document.getElementById('curtain');
    const fadeEl   = document.getElementById('fade');

    const GRAVITY  = 4900;   // px/s² — natural, not exaggerated
    const RESTITUTION = 0.15; // how much velocity survives the bounce — small, realistic
    const STOP_VEL = 60;     // below this on bounce, just stop

    const START_Y = -(window.innerHeight * 1.15);

    const state = letters.map(() => ({
      // World position of letter center
      x:  0,
      y:  START_Y,
      vx: 0,
      vy: 0,
      // Rotation
      rot:  0,
      vrot: 0,
      // Pendulum state (only active while dragging)
      pendAngle:  0,   // radians from vertical
      pendVAngle: 0,   // angular velocity rad/s
      active:  false,
      settled: false,
    }));

    let cursorX    = window.innerWidth  / 2;
    let cursorY    = window.innerHeight / 2;
    let allSettled = false;
    let rafId      = null;
    let lastTime   = null;

    // Open curtain
    setTimeout(() => curtain.classList.add('open'), 200);

    // Drop with 200ms stagger
    letters.forEach((el, i) => {
      setTimeout(() => {
        state[i].active = true;
        el.style.opacity = '1';
        if (!rafId) { lastTime = null; rafId = requestAnimationFrame(tick); }
      }, 900 + i * 200);
    });

    // Pivot position (cursor) updated each mousemove
    let pivotX = window.innerWidth  / 2;
    let pivotY = window.innerHeight / 2;

    function tick(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min((ts - lastTime) / 1000, 0.05);
      lastTime = ts;
      dt_last  = dt;
      let anyMoving = false;

      letters.forEach((el, i) => {
        const s = state[i];
        if (!s.active) return;

        if (dragging === i) {
          // ── PENDULUM ──
          // Pivot is cursor. Letter hangs on a "rope" of length = distance
          // from grab point to letter center at the moment of pickup.
          // Gravity pulls the angle toward 0 (hanging straight down).
          const g   = GRAVITY; // reuse same gravity constant
          const L   = s.pendLength; // rope length in px

          // Pendulum equation: α = -(g/L) * sin(θ) - damping
          const alpha = -(g / L) * Math.sin(s.pendAngle) - s.pendVAngle * 1.8;
          s.pendVAngle += alpha * dt;
          s.pendAngle  += s.pendVAngle * dt;

          // Letter center = pivot + rope in direction of angle
          // angle=0 → hangs straight down, positive = swings right
          s.x = pivotX + Math.sin(s.pendAngle) * L - window.innerWidth  / 2;
          s.y = pivotY + Math.cos(s.pendAngle) * L - window.innerHeight / 2;

          // Visual rotation follows the swing angle
          s.rot = s.pendAngle * (180 / Math.PI);

          anyMoving = true;

        } else if (!s.settled) {
          // ── FREE FALL ──
          s.vy += GRAVITY * dt;
          s.y  += s.vy * dt;

          s.vx *= (1 - 4 * dt);
          s.x  += s.vx * dt;

          // Spring rotation back to upright
          s.vrot += (-s.rot * 14 - s.vrot * 7) * dt;
          s.rot  += s.vrot * dt;

          // Floor bounce
          if (s.y >= 0) {
            s.y = 0;
            const bounced = -s.vy * RESTITUTION;
            if (Math.abs(bounced) < STOP_VEL) {
              s.vy = 0; s.vx = 0;
              s.settled = true;
            } else {
              s.vy = bounced;
            }
          }

          // Walls
          const halfW = window.innerWidth  / 2 - 40;
          const halfH = window.innerHeight / 2 - 40;
          if (s.x >  halfW) { s.x =  halfW; s.vx *= -0.3; }
          if (s.x < -halfW) { s.x = -halfW; s.vx *= -0.3; }
          if (s.y < -halfH) { s.y = -halfH; s.vy *= -0.3; }

          anyMoving = true;
        }

        el.style.transform = `translate(${s.x}px, ${s.y}px) rotate(${s.rot}deg)`;
      });

      if (!allSettled && state.every(s => !s.active || s.settled)) allSettled = true;
      rafId = anyMoving ? requestAnimationFrame(tick) : null;
    }

    let dragging = null;
    let dt_last  = 0.016;

    window.addEventListener('mousedown', e => {
      if (!allSettled) return;
      letters.forEach((el, i) => {
        const rect = el.getBoundingClientRect();
        if (
          e.clientX >= rect.left && e.clientX <= rect.right &&
          e.clientY >= rect.top  && e.clientY <= rect.bottom
        ) {
          dragging = i;
          const s = state[i];
          s.settled = false;

          // Pivot = cursor (grab point in screen space)
          pivotX = e.clientX;
          pivotY = e.clientY;

          // Letter center in screen space
          const lcx = rect.left + rect.width  / 2;
          const lcy = rect.top  + rect.height / 2;

          // Rope vector from pivot to letter center
          const rx = lcx - pivotX;
          const ry = lcy - pivotY;

          // Rope length
          s.pendLength = Math.sqrt(rx * rx + ry * ry) || 80;

          // Initial angle from vertical (atan2: right = positive)
          s.pendAngle  = Math.atan2(rx, ry);
          s.pendVAngle = 0;

          s.vx = 0;
          s.vy = 0;

          e.preventDefault();
          if (!rafId) { lastTime = null; rafId = requestAnimationFrame(tick); }
        }
      });
    });

    window.addEventListener('mousemove', e => {
      cursorX = e.clientX;
      cursorY = e.clientY;
      if (dragging !== null) {
        // Move the pivot with the cursor
        pivotX = e.clientX;
        pivotY = e.clientY;
      }
    });

    window.addEventListener('mouseup', () => {
      if (dragging !== null) {
        const s = state[dragging];
        // Convert pendulum angular velocity back to linear velocity
        const L = s.pendLength;
        // Tangential velocity = ω × r, perpendicular to rope
        const angle = s.pendAngle;
        const vTan  = s.pendVAngle * L;
        // Tangent direction is perpendicular to rope (cos, -sin)
        s.vx = vTan *  Math.cos(angle) * 0.4;
        s.vy = vTan * -Math.sin(angle) * 0.4;
        // Carry some of the swing rotation into free rotation
        s.vrot = s.pendVAngle * 60;
        dragging = null;
        if (!rafId) { lastTime = null; rafId = requestAnimationFrame(tick); }
      }
    });

    setTimeout(() => {
      fadeEl.classList.add('active');
      setTimeout(() => { window.location.href = 'home.html'; }, 950);
    }, 4400);
  </script>
</body>
</html>
